name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug env
        run: |
          python --version
          pwd
          ls -la

      - name: Run unit tests
        run: python run_tests.py

      - name: Run observability demo
        run: python run_observability_demo.py

      - name: Ensure report exists
        run: test -f artifacts/latest_report.json
