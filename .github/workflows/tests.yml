name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run tests (discover)
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Run tests (script)
        run: python run_tests.py
